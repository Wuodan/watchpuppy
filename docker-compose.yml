services:
  watchpuppy:
    build:
      context: .
    image: wuodan/watchpuppy:latest
    container_name: watchpuppy-alpine
    command: ["watchpuppy", "/data/input", "echo"]
    environment:
      LOG_LEVEL: DEBUG
    volumes:
      - ./input/:/data/input:ro
  watchpuppy-debian:
    build:
      context: .
    image: wuodan/watchpuppy:debian
    container_name: watchpuppy-debian
    command: ["watchpuppy", "/data/input", "echo"]
    environment:
      LOG_LEVEL: DEBUG
    volumes:
      - ./input/:/data/input:ro
  watchpuppy-demo:
    build:
      context: .
    image: wuodan/watchpuppy:latest
    container_name: watchpuppy-alpine
    volumes:
      - ./input/:/data/input
    command:
      - "sh"
      - "-c"
      - |
        watchpuppy /data/input echo && \
        touch /data/input/shared-folder-file && \
        mkdir /home/appuser/demo-dir && \
        watchpuppy /home/appuser/demo-dir echo && \
        touch /home/appuser/demo-dir/'inotify-capable file  insert.txt' && \
        echo 'Done'