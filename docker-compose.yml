services:
  watchpuppy:
    build:
      context: .
    image: wuodan/watchpuppy:latest
    container_name: watchpuppy-alpine
    command: ["watchpuppy", "/data/input", "echo"]
    environment:
      LOG_LEVEL: DEBUG
    volumes:
      - ./input/:/data/input:ro
  watchpuppy-debian:
    build:
      context: .
      args:
        BASE_IMAGE: python:3-slim-bookworm
    image: wuodan/watchpuppy:debian
    container_name: watchpuppy-debian
    command: ["watchpuppy", "/data/input", "echo"]
    environment:
      LOG_LEVEL: DEBUG
    volumes:
      - ./input/:/data/input:ro
